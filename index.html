<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>InnoCORE 연구단</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 공통 스타일 -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- 홈 전용 -->
  <link rel="stylesheet" href="assets/css/home.css" />
</head>

<body class="home">

<header class="site-header">
  <a class="brand" href="/NPL_WEBSITE/" aria-label="Go to Home">

    <span class="brand-text">InnoCORE 연구단</span>
  </a>

  <nav class="site-nav">
    <a href="/NPL_WEBSITE/">Home</a>
    <a href="/NPL_WEBSITE/research/">Project</a>
    <a href="/NPL_WEBSITE/member/">Member</a>
    <a href="/NPL_WEBSITE/contact/">Contact</a>
  </nav>
</header>

<!-- =========================
  여기에 InnoCORE 제일 중요한 사진 넣기
========================= -->
<section class="home-hero-dual">
  <div>
    <figure class="hero-item hero-item-optic">
      <img
        src="assets/img/main/main1.png"
        alt="Optical setup in the laboratory"
      />
    </figure>
  </div>
</section>

<!-- =========================
     MAIN
========================= -->
<main class="home-page">

  <!-- Lab Highlights -->
  <section class="home-section">
    <div class="section-head-row">
      <div>
        <h2>Highlights</h2>
      </div>
    </div>

    <div class="home-showcase-card">
      <div class="photo-slider">
        <button class="slider-btn prev" aria-label="Previous slide">‹</button>

        <div class="slider-viewport">
          <div class="slider-track">
            <img
              src="assets/img/main/main2.png"
              class="slider-image"
            />

            <img
              src="assets/img/main/main3.png"
              class="slider-image"
            />

            <img
            src="assets/img/main/main4.png"
            class="slider-image"
          />
          </div>
        </div>

        <button class="slider-btn next" aria-label="Next slide">›</button>
      </div>

      <div class="slider-dots">
        <button class="dot active" aria-label="Go to slide 1"></button>
        <button class="dot" aria-label="Go to slide 2"></button>
      </div>
    </div>
  </section>

</main>

<footer>
  © 2025 GIST Neurophotonics Lab. All rights reserved.
</footer>

<script src="assets/js/main.js"></script>
</body>
</html>
